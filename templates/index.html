<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ app_name }}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <h1>{{ app_name }}</h1>
    </header>

    <div class="container">
        <!-- メッセージ表示エリア -->
        <div id="message" class="message"></div>

        <!-- メモ作成フォーム -->
        <div class="create-form">
            <h2>新しいメモを作成</h2>
            <form id="create-memo-form">
                <div class="form-group">
                    <label for="title">タイトル</label>
                    <input type="text" id="title" placeholder="メモのタイトルを入力" required>
                </div>
                <div class="form-group">
                    <label for="content">内容</label>
                    <textarea id="content" placeholder="メモの内容を入力" required></textarea>
                </div>
                <div class="form-group">
                    <label for="category">カテゴリ</label>
                    <select id="category">
                        <option value="">カテゴリなし</option>
                        <option value="仕事">仕事</option>
                        <option value="個人">個人</option>
                        <option value="アイデア">アイデア</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">作成</button>
            </form>
        </div>

        <!-- メモ一覧 -->
        <div class="memo-list">
            <h2>メモ一覧 <span id="memo-count" class="memo-count"></span></h2>
            <div id="memos"></div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
